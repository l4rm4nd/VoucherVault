{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block content %}
<style>
/* Success Page Styles */
.success-container {
  max-width: 500px;
  margin: 2rem auto;
  text-align: center;
}

.success-card {
  background: var(--card-bg, #fff);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  border: 1px solid var(--border-color, #eee);
  padding: 2.5rem;
}

.success-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.5rem;
  animation: scaleIn 0.4s ease-out;
}

@keyframes scaleIn {
  0% {
    transform: scale(0);
    opacity: 0;
  }
  50% {
    transform: scale(1.1);
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.success-icon i {
  font-size: 2.5rem;
  color: white;
}

.success-title {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-color, #1e1e1e);
  margin-bottom: 0.75rem;
}

.success-message {
  font-size: 0.95rem;
  color: #6c757d;
  margin-bottom: 2rem;
  line-height: 1.6;
}

.btn-primary-modern {
  padding: 0.75rem 1.5rem;
  background: var(--primary-color, #4154f1);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.2s ease;
  text-decoration: none;
}

.btn-primary-modern:hover {
  background: #3142c4;
  transform: translateY(-1px);
  color: white;
}

/* Dark Mode */
body.dark-mode .success-card {
  background: #1e1e1e;
  border-color: #333;
}

body.dark-mode .success-title {
  color: #e0e0e0;
}

body.dark-mode .success-message {
  color: #aaa;
}

/* Responsive */
@media (max-width: 640px) {
  .success-container {
    margin: 1rem;
  }
  
  .success-card {
    padding: 2rem 1.5rem;
  }
}
</style>

<div class="success-container">
  <div class="success-card">
    <div class="success-icon">
      <i class="bi bi-check-lg"></i>
    </div>
    <h1 class="success-title">{% trans "Password Changed" %}</h1>
    <p class="success-message">{% trans "Your password has been successfully changed. You can now use your new password to log in." %}</p>
    <a href="{% url 'show_items' %}" class="btn-primary-modern">
      <i class="bi bi-arrow-left"></i>
      {% trans "Go to Inventory" %}
    </a>
  </div>
</div>
{% endblock content %}
